site_name: serial-scale-hx711
site_description: Python driver for Arduino+HX711 serial weighing scales
site_url: https://MurineShiftWork.github.io/serial-scale-hx711/
repo_url: https://github.com/MurineShiftWork/serial-scale-hx711
repo_name: MurineShiftWork/serial-scale-hx711
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    scheme: slate
    primary: teal
    accent: teal
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - toc

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_root_heading: true
            show_source: false
            show_submodules: false

nav:
  - Home: index.md
  - Getting Started: getting_started.md
  - Usage: usage.md
  - Hardware: hardware.md
  - API Reference: api.md
